<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Code 39 Scanner</title>
        <script src="https://serratus.github.io/quaggaJS/examples/js/quagga.min.js"></script>
        <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
        <style>
            body {
                margin: 0;
                font-family: Arial;
                text-align: center;
            }
            #scanner {
                width: 200px;
                height: 100px;
                background: white;
            }
            button {
                margin-top: 10px;
                padding: 10px 20px;
                font-size: 16px;
            }
            #result {
                margin-top: 10px;
                font-size: 18px;
                font-weight: bold;
            }
        </style>
    </head>
    <body>

        <div id="scanner"></div>
        <div>
            <button onclick="startScanner()">Scan Barcode</button>
            <button onclick="toggleMode()">Mode: <span id="modeLabel">Auto</span></button>
            <button id="captureBtn" onclick="manualCapture()" style="display:none;">Capture</button>
        </div>

        <div id="result">No scan yet</div>

        <script type="text/javascript">
            let scanning = false;
            let autoMode = true;
            let lastDetectedCode = null;

            function startScanner() {
                if (scanning) return;

                Quagga.init({
                    inputStream: {
                        type: "LiveStream",
                        target: document.querySelector('#scanner'),
                        constraints: {
                            facingMode: "environment"
                        }
                    },
                    locator: {
                        halfSample: true
                    },
                    decoder: {
                        readers: ["code_39_reader"]
                    }
                }, function(err) {
                    if (err) {
                        console.error(err);
                        alert("Camera error");
                        return;
                    }
                    Quagga.start();
                    scanning = true;
                });

                Quagga.onDetected(function(result) {
                    const code = result.codeResult.code;

                    // Always store latest detected code
                    lastDetectedCode = code;

                    if (autoMode) {
                        finalizeScan(code);
                    } else {
                        // Show preview only
                        document.getElementById("result").innerText = "Detected: " + code;
                    }
                });
            }

            function toggleMode() {
                autoMode = !autoMode;

                document.getElementById("modeLabel").innerText = autoMode ? "Auto" : "Manual";
                document.getElementById("captureBtn").style.display = autoMode ? "none" : "inline-block";
            }

            function manualCapture() {
                if (!lastDetectedCode) {
                    alert("No barcode detected yet.");
                    return;
                }

                finalizeScan(lastDetectedCode);
            }

            function finalizeScan(code) {
                document.getElementById("result").innerText = "Scanned: " + code;

                JFCustomWidget.sendData({
                    value: code
                });

                Quagga.stop();
                scanning = false;
            }
        </script>
    </body>
</html>
