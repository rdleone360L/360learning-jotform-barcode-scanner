<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Code 39 Scanner</title>
        <script src="https://serratus.github.io/quaggaJS/examples/js/quagga.min.js"></script>
        <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
        <style>
            body {
                margin: 0;
                font-family: Arial;
                text-align: center;
            }
            #scanner {
                width: 400px;
                height: 200px;
                background: white;
            }
            button {
                margin-top: 10px;
                padding: 10px 20px;
                font-size: 16px;
            }
            #result {
                margin-top: 10px;
                font-size: 18px;
                font-weight: bold;
            }
        </style>
    </head>
    <body>

        <div id="scanner"></div>
        <button onclick="startScanner()">Scan Barcode</button>
        <div id="result">No scan yet</div>

        <script type="text/javascript">
            let scanning = false;

            function startScanner() {
                if(scanning) return;

                Quagga.init({
                    inputStream: {
                        type: "LiveStream",
                        target: document.querySelector('#scanner'),
                        constraints: {
                            facingMode: "environment"
                        }
                    },
                    decoder: {
                        readers: ["code_39_reader"],
                        locator: { halfSample: true },
                        numOfWorkers: 2
                    }
                }, function(err) {
                    if (err) {
                        console.error(err);
                        alert("Camera error");
                        return;
                    }
                    Quagga.start();
                    scanning = true;
                });

                Quagga.onDetected(function(result) {
                    const code = result.codeResult.code;

                    document.getElementById("result").innerText = code;

                    // Send value to Jotform
                    JFCustomWidget.sendData({
                        value: code
                    });

                    // Stop after successful scan
                    Quagga.stop();
                    scanning = false;
                });
            }
        </script>
    </body>
</html>
