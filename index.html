<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pass/Fail Table</title>
        <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
        <style>
            body {
                margin: 0;
                font-family: Arial;
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            table, th, td {
                border: 1px solid black;
                border-collapse: collapse;
            }
            table {
                margin: 2rem;
                padding: 8px;
                text-align: center;
                width: 75%;
            }
            th {
                background-color: rgb(57, 211, 78);
            }
            .email-col {
                text-align: start;
            }
            #barcode-id {
                padding: 4px 12px 12px 12px;
            }
        </style>
    </head>
    <body>
        <label for="barcode-id">Scan an Employee ID</label>
        <div id="barcode-id">
            <input type="text" name="barcode-id-input" id="barcode-id-input"></select>
            <button id="barcode-id-btn">Submit</button>
        </div>
        <table id="passed-table">
            <thead>
                <tr>
                    <th>Learner</th>
                    <th>Passed</th>
                </tr>
            </thead>
            <tbody id="passed-body"></tbody>
        </table>

        <script type="text/javascript">
            const idInput = document.querySelector('#barcode-id-input');
            const idBtn = document.querySelector('#barcode-id-btn');
            const passedTblBody = document.querySelector('#passed-body');

            let data = [];

            function syncTable(entry) {
                if(!data.map(d => d.email).includes(entry)) {
                    data.push({
                        email: entry,
                        passed: false
                    });
                    renderTable();
                }
            }

            function renderTable() {
                passedTblBody.innerHTML = "";

                data.forEach((row, index) => {
                    const tr = document.createElement("tr");

                    const tdEmail = document.createElement("td");
                    tdEmail.textContent = data[index].email;

                    const tdCheckbox = document.createElement("td");
                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.checked = data[index].passed;
                    checkbox.addEventListener('input', () => {
                        data[index].passed = !data[index].passed;
                    });

                    tdCheckbox.appendChild(checkbox);
                    tr.appendChild(tdEmail);
                    tr.appendChild(tdCheckbox);
                    passedTblBody.appendChild(tr);
                });
            }

            idInput.addEventListener('keypress', event => {
                if(event.key === "Enter") {
                    event.preventDefault();
                    syncTable(idInput.value);
                    idInput.value = "";
                    console.log(JSON.stringify(data));
                }
            });

            idBtn.addEventListener('click', () => {
                syncTable(idInput.value);
                idInput.value = "";
                console.log(JSON.stringify(data));
            });

            JFCustomWidget.subscribe("submit", async function() {
                const formData = data;
                const result = {
                    valid: data ? true : false,
                    value: data ? JSON.stringify(data) : ""
                };
                JFCustomWidget.sendSubmit(result);
            });
        </script>
    </body>
</html>
